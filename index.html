<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Six-Huit | Apprentissage Musical</title>

    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="icon"
      href="/assets/img/icons/app-icon-86.png"
      type="image/png"
    />
    <link rel="apple-touch-icon" href="/assets/img/icons/app-icon-86.png" />

    <meta
      name="theme-color"
      content="#2563eb"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#001a4d"
      media="(prefers-color-scheme: dark)"
    />
  </head>

  <body>
    <div id="header-placeholder"></div>
    <div id="app"></div>
    <div id="footer-placeholder"></div>

    <script type="module">
      import { AppModel } from "./src/model/AppModel.js";
      import { AppView } from "./src/view/AppView.js";
      import { AppController } from "./src/controller/AppController.js";

      async function loadPartial(id, url) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            document.getElementById(id).innerHTML = await res.text();
            return true;
          }
        } catch (e) {
          console.error(`Erreur de chargement du composant ${url}:`, e);
        }
        return false;
      }

      document.addEventListener("DOMContentLoaded", async () => {
        try {
          await Promise.all([
            loadPartial("header-placeholder", "/src/view/header.html"),
            loadPartial("footer-placeholder", "/src/view/footer.html"),
          ]);

          const appModel = new AppModel();
          const view = new AppView();
          const appController = new AppController(appModel, view);

          window.appController = appController;

          await appController.init();
        } catch (error) {
          console.error(
            "Erreur critique au lancement de l'application:",
            error,
          );
        }
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .catch((err) =>
              console.error("Erreur d'enregistrement du Service Worker:", err),
            );
        });
      }
    </script>
  </body>
</html>
